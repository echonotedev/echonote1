<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Echo — threads to yourself</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF8F4;
    --surface:#FFFFFF;
    --sidebar-bg:#1B1726;
    --sidebar-elev:#241F33;
    --sidebar-active:#322B49;
    --sidebar-text:#ECE8F4;
    --sidebar-muted:#9A93AE;
    --ink:#221E2E;
    --muted:#857E95;
    --line:#ECE6DD;
    --self:#574B90;
    --self-hi:#6A5CAE;
    --accent:#E8A23D;
    --danger:#C9544B;
    --radius:16px;
    --shadow:0 1px 2px rgba(34,30,46,.05), 0 8px 24px rgba(34,30,46,.06);
    font-size:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    font-family:"Inter",system-ui,sans-serif;
    color:var(--ink);
    background:var(--sidebar-bg);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:rgba(133,126,149,.35);border-radius:9px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(133,126,149,.55);}

  .app{
    display:grid;
    grid-template-columns:312px 1fr;
    height:100dvh;
  }

  /* ---------- Sidebar ---------- */
  .side{
    background:var(--sidebar-bg);
    color:var(--sidebar-text);
    display:flex;flex-direction:column;
    min-height:0;
    border-right:1px solid rgba(255,255,255,.05);
  }
  .brand{
    display:flex;align-items:center;gap:11px;
    padding:20px 20px 14px;
  }
  .brand .mark{
    width:34px;height:34px;border-radius:11px;
    background:linear-gradient(150deg,var(--self-hi),var(--self));
    display:grid;place-items:center;flex:none;
    box-shadow:0 4px 14px rgba(87,75,144,.45);
  }
  .brand .mark svg{width:18px;height:18px;}
  .brand h1{
    font-family:"Bricolage Grotesque",sans-serif;
    font-size:1.35rem;font-weight:700;letter-spacing:-.02em;margin:0;line-height:1;
  }
  .brand .sub{
    font-family:"JetBrains Mono",monospace;
    font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
    color:var(--sidebar-muted);margin-top:3px;
  }
  .brand{position:relative;}
  .share-btn{
    margin-left:auto;width:36px;height:36px;border-radius:10px;flex:none;
    display:grid;place-items:center;color:var(--sidebar-muted);
    background:var(--sidebar-elev);transition:color .12s,background .12s;
  }
  .share-btn:hover{color:var(--sidebar-text);background:var(--sidebar-active);}
  .share-btn svg{width:17px;height:17px;}
  .toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;
    font-size:.85rem;box-shadow:0 12px 30px rgba(27,23,38,.35);
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:80;
  }
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

  .you{
    margin:2px 14px 12px;padding:10px 12px;border-radius:13px;
    background:var(--sidebar-elev);
    display:flex;align-items:center;gap:11px;
  }
  .you .av{
    width:36px;height:36px;border-radius:50%;flex:none;
    background:linear-gradient(150deg,#8377c4,var(--self));
    display:grid;place-items:center;font-weight:600;font-size:.95rem;color:#fff;
  }
  .you .meta{min-width:0;}
  .you .meta b{font-size:.92rem;font-weight:600;display:block;}
  .you .meta span{font-size:.72rem;color:var(--sidebar-muted);}

  .side-tools{padding:0 14px 10px;display:flex;gap:8px;}
  .search{
    flex:1;display:flex;align-items:center;gap:8px;
    background:var(--sidebar-elev);border-radius:11px;padding:9px 11px;
  }
  .search svg{width:15px;height:15px;color:var(--sidebar-muted);flex:none;}
  .search input{
    border:none;background:none;outline:none;color:var(--sidebar-text);
    font-size:.88rem;width:100%;
  }
  .search input::placeholder{color:var(--sidebar-muted);}
  .new-btn{
    width:40px;flex:none;border-radius:11px;background:var(--self);
    display:grid;place-items:center;transition:background .15s;
  }
  .new-btn:hover{background:var(--self-hi);}
  .new-btn svg{width:18px;height:18px;color:#fff;}

  .threads{
    flex:1;overflow-y:auto;padding:4px 10px 16px;min-height:0;
  }
  .thread{
    display:flex;align-items:center;gap:12px;
    padding:11px 12px;border-radius:13px;margin-bottom:2px;
    cursor:pointer;transition:background .12s;position:relative;
  }
  .thread:hover{background:var(--sidebar-elev);}
  .thread.active{background:var(--sidebar-active);}
  .thread .tav{
    width:38px;height:38px;border-radius:11px;flex:none;
    display:grid;place-items:center;font-family:"Bricolage Grotesque",sans-serif;
    font-weight:700;font-size:1rem;color:#fff;
  }
  .thread .body{flex:1;min-width:0;}
  .thread .row1{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .thread .name{font-weight:600;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .thread .time{font-family:"JetBrains Mono",monospace;font-size:.64rem;color:var(--sidebar-muted);flex:none;}
  .thread .preview{font-size:.8rem;color:var(--sidebar-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .thread .pinmark{display:inline-flex;vertical-align:-2px;margin-right:4px;}
  .thread .pinmark svg{width:12px;height:12px;color:var(--accent);}
  .thread-pin{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    width:30px;height:30px;border-radius:8px;display:none;place-items:center;
    color:var(--sidebar-muted);background:var(--sidebar-bg);
  }
  .thread-pin svg{width:15px;height:15px;}
  .thread:hover .thread-pin{display:grid;}
  .thread:hover .thread-pin:hover{color:var(--accent);background:var(--sidebar-active);}
  .thread.is-pinned .thread-pin{display:grid;color:var(--accent);background:transparent;}

  /* folders */
  .folder{display:flex;align-items:center;gap:8px;padding:9px 12px 7px;cursor:pointer;border-radius:10px;margin-top:6px;user-select:none;}
  .folder:hover{background:var(--sidebar-elev);}
  .folder .fchev{display:inline-flex;transition:transform .15s;color:var(--sidebar-muted);}
  .folder .fchev svg{width:14px;height:14px;}
  .folder:not(.collapsed) .fchev{transform:rotate(90deg);}
  .folder .ficon{display:inline-flex;color:var(--sidebar-muted);}
  .folder .ficon svg{width:15px;height:15px;}
  .folder .fname{font-size:.8rem;font-weight:600;letter-spacing:.01em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .folder .fcount{font-family:"JetBrains Mono",monospace;font-size:.64rem;color:var(--sidebar-muted);}
  .folder .fmenu{width:24px;height:24px;border-radius:6px;display:none;place-items:center;color:var(--sidebar-muted);}
  .folder:hover .fmenu{display:grid;}
  .folder .fmenu:hover{color:var(--sidebar-text);background:var(--sidebar-active);}
  .folder .fmenu svg{width:14px;height:14px;}
  .folder-body{padding-left:8px;border-left:2px solid var(--sidebar-elev);margin-left:14px;
    max-height:1500px;overflow:hidden;transition:max-height .3s ease,opacity .2s ease;}
  .folder-body.collapsed{max-height:0;opacity:0;border-left-color:transparent;}
  .folder-label{font-family:"JetBrains Mono",monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--sidebar-muted);padding:14px 12px 4px;}

  /* theme swatch button in the you-card */
  .you-theme{width:26px;height:26px;border-radius:50%;flex:none;margin-left:auto;border:2px solid rgba(255,255,255,.25);background:var(--self);transition:transform .12s;}
  .you-theme:hover{transform:scale(1.1);}

  .empty-side{padding:30px 22px;color:var(--sidebar-muted);font-size:.85rem;line-height:1.55;text-align:center;}

  /* ---------- Main ---------- */
  .main{
    background:var(--paper);
    display:flex;flex-direction:column;min-width:0;min-height:0;
    border-radius:0;
  }
  .topbar{
    display:flex;align-items:center;gap:12px;
    padding:14px 20px;border-bottom:1px solid var(--line);
    background:var(--surface);
  }
  .back{display:none;width:34px;height:34px;border-radius:9px;align-items:center;justify-content:center;}
  .back:hover{background:var(--paper);}
  .back svg{width:20px;height:20px;}
  .topbar .tav{
    width:38px;height:38px;border-radius:11px;flex:none;
    display:grid;place-items:center;font-family:"Bricolage Grotesque",sans-serif;
    font-weight:700;color:#fff;font-size:1rem;
  }
  .topbar .ttl{flex:1;min-width:0;}
  .topbar .ttl h2{
    font-family:"Bricolage Grotesque",sans-serif;font-weight:700;
    font-size:1.12rem;margin:0;letter-spacing:-.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .topbar .ttl .note{font-size:.74rem;color:var(--muted);margin-top:1px;}
  .icon-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--muted);transition:background .12s,color .12s;}
  .icon-btn:hover{background:var(--paper);color:var(--ink);}
  .icon-btn svg{width:19px;height:19px;}

  .find{
    display:none;padding:9px 20px;border-bottom:1px solid var(--line);background:var(--surface);
    align-items:center;gap:9px;
  }
  .find.on{display:flex;}
  .find svg{width:15px;height:15px;color:var(--muted);}
  .find input{flex:1;border:none;outline:none;background:none;font-size:.9rem;color:var(--ink);}

  .stream{
    flex:1;overflow-y:auto;padding:24px 20px 8px;min-height:0;
    display:flex;flex-direction:column;gap:3px;
    background:
      radial-gradient(circle at 1px 1px, rgba(87,75,144,.045) 1px, transparent 0) 0 0/22px 22px;
  }
  .daysep{align-self:center;font-family:"JetBrains Mono",monospace;font-size:.62rem;
    letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    background:var(--surface);border:1px solid var(--line);
    padding:4px 12px;border-radius:20px;margin:14px 0 10px;}

  .msg{
    align-self:flex-end;max-width:74%;position:relative;
  }
  .msg.appear{animation:rise .26s cubic-bezier(.2,.8,.2,1);}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .stream{animation:streamIn .28s ease;}
  @keyframes streamIn{from{opacity:0;}to{opacity:1;}}
  .bubble{
    background:var(--self);color:#fff;
    padding:10px 13px 8px;border-radius:16px 16px 5px 16px;
    box-shadow:0 1px 2px rgba(87,75,144,.25);
    font-size:.93rem;line-height:1.45;overflow-wrap:anywhere;
  }
  .bubble.pinned{box-shadow:0 0 0 2px var(--accent), 0 1px 2px rgba(87,75,144,.25);}
  .bubble a{color:#fff;text-decoration:underline;text-underline-offset:2px;}
  .stamp{
    display:flex;align-items:center;gap:5px;justify-content:flex-end;
    font-family:"JetBrains Mono",monospace;font-size:.62rem;color:var(--muted);
    margin:3px 4px 8px;
  }
  .stamp .pin{color:var(--accent);}
  .stamp svg{width:11px;height:11px;}

  .att{
    display:flex;align-items:center;gap:11px;
    background:rgba(255,255,255,.16);border-radius:11px;
    padding:9px 11px;margin-top:7px;cursor:pointer;transition:background .12s;
  }
  .att:hover{background:rgba(255,255,255,.26);}
  .att .ico{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.2);display:grid;place-items:center;flex:none;}
  .att .ico svg{width:17px;height:17px;color:#fff;}
  .att .ai{min-width:0;flex:1;}
  .att .ai b{display:block;font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .att .ai span{font-size:.68rem;opacity:.8;font-family:"JetBrains Mono",monospace;}
  .att img.thumb{width:100%;border-radius:9px;margin-top:7px;display:block;max-height:280px;object-fit:cover;}

  /* in-bubble quote (reply / cross-thread) */
  .quote{display:block;border-left:3px solid rgba(255,255,255,.55);background:rgba(255,255,255,.13);
    border-radius:8px;padding:6px 10px;margin-bottom:7px;cursor:pointer;}
  .quote:hover{background:rgba(255,255,255,.2);}
  .quote .qname{display:block;font-size:.68rem;font-weight:600;opacity:.85;margin-bottom:1px;}
  .quote .qtext{display:block;font-size:.8rem;opacity:.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bodyline{min-height:.5em;white-space:pre-wrap;overflow-wrap:anywhere;}

  /* checklists */
  .todo-row{display:flex;align-items:flex-start;gap:9px;padding:3px 0;}
  .todo{width:20px;height:20px;border-radius:6px;flex:none;margin-top:1px;border:2px solid rgba(255,255,255,.6);
    background:transparent;display:grid;place-items:center;color:var(--self);transition:background .12s,border-color .12s;}
  .todo.done{background:#fff;border-color:#fff;}
  .todo svg{width:13px;height:13px;}
  .todo-done{opacity:.6;text-decoration:line-through;}

  /* reminder chip */
  .remind-chip{display:inline-flex;align-items:center;gap:6px;margin-top:8px;
    background:var(--accent);color:#3a2c10;border-radius:9px;padding:5px 9px;font-size:.72rem;font-weight:600;}
  .remind-chip.past{background:var(--danger);color:#fff;}
  .remind-chip svg{width:13px;height:13px;}
  .remind-chip .remind-x{display:grid;place-items:center;width:16px;height:16px;border-radius:50%;color:inherit;opacity:.7;}
  .remind-chip .remind-x:hover{opacity:1;background:rgba(0,0,0,.12);}
  .remind-chip .remind-x svg{width:11px;height:11px;}
  .remindbtn.set{color:var(--accent);}

  /* flash when jumping to a quoted message */
  .msg.flash .bubble{animation:flash 1.2s ease;}
  @keyframes flash{0%,100%{box-shadow:0 1px 2px rgba(87,75,144,.25);}30%{box-shadow:0 0 0 3px var(--accent);}}

  /* reply/quote preview bar above composer */
  .reply-bar{display:none;align-items:center;gap:11px;padding:10px 13px;margin-bottom:10px;
    background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--self);border-radius:12px;}
  .reply-bar.on{display:flex;}
  .reply-bar .rb-icon{color:var(--self);display:inline-flex;}
  .reply-bar .rb-icon svg{width:17px;height:17px;}
  .reply-bar .rb-body{flex:1;min-width:0;}
  .reply-bar .rb-body b{display:block;font-size:.74rem;color:var(--self);}
  .reply-bar .rb-body span{display:block;font-size:.82rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .reply-bar .rb-x{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:var(--muted);}
  .reply-bar .rb-x:hover{background:var(--surface);color:var(--ink);}
  .reply-bar .rb-x svg{width:16px;height:16px;}

  /* picker + theme grid + stacked dialog buttons */
  .picklist{display:flex;flex-direction:column;gap:6px;max-height:50vh;overflow-y:auto;}
  .pick{text-align:left;padding:12px 14px;border-radius:11px;background:var(--paper);font-size:.9rem;color:var(--ink);}
  .pick:hover{background:var(--line);}
  .go.stacked{width:100%;margin-top:10px;background:var(--paper);color:var(--ink);}
  .go.stacked:hover{background:var(--line);}
  .themegrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .themecard{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;border:2px solid var(--line);font-size:.88rem;color:var(--ink);background:var(--surface);}
  .themecard:hover{border-color:var(--muted);}
  .themecard.on{border-color:var(--self);}
  .themecard .sw{width:22px;height:22px;border-radius:50%;flex:none;}

  /* avatar images */
  .you .av img, .set-av img{width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block;}
  .you-gear{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--sidebar-muted);flex:none;}
  .you-gear:hover{color:var(--sidebar-text);background:var(--sidebar-active);}
  .you-gear svg{width:17px;height:17px;}
  .you{cursor:pointer;}

  /* settings panel */
  .set-head{display:flex;align-items:center;gap:13px;margin-bottom:18px;}
  .set-av{width:46px;height:46px;border-radius:50%;flex:none;display:grid;place-items:center;
    background:linear-gradient(150deg,var(--self-hi),var(--self));color:#fff;font-weight:600;overflow:hidden;}
  .set-head h3{margin:0;}
  .set-label{display:block;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:16px 0 7px;font-weight:600;}
  #setName{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-family:inherit;font-size:.95rem;outline:none;color:var(--ink);background:var(--surface);}
  #setName:focus{border-color:var(--self);}
  .set-note{font-size:.85rem;color:var(--muted);line-height:1.5;margin:0;}
  .set-acct{display:flex;flex-direction:column;gap:12px;}
  .set-acct-row{display:flex;align-items:center;gap:11px;}
  .set-acct-row b{display:block;font-size:.88rem;}
  .set-acct-row span{font-size:.8rem;color:var(--muted);}
  .set-acct .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .set-acct .dot.ok{background:#3F9E6E;box-shadow:0 0 0 3px rgba(63,158,110,.18);}
  .set-acct .go.danger{width:100%;background:var(--danger);color:#fff;}
  .set-acct .go.danger:hover{filter:brightness(1.05);}
  input[type="datetime-local"]{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-family:inherit;font-size:.95rem;outline:none;color:var(--ink);background:var(--surface);}

  .ghosted{background:var(--sidebar-elev)!important;}
  .ghosted:hover{background:var(--sidebar-active)!important;}
  .ghosted svg{color:var(--sidebar-muted);}

  .acts{
    position:absolute;top:6px;right:6px;
    opacity:0;pointer-events:none;transition:opacity .12s;z-index:5;
  }
  .msg:hover .acts{opacity:1;pointer-events:auto;}
  .acts .morebtn{
    width:26px;height:26px;border-radius:8px;display:grid;place-items:center;
    color:#fff;background:rgba(255,255,255,.18);backdrop-filter:blur(2px);
  }
  .acts .morebtn:hover{background:rgba(255,255,255,.32);}
  .acts .morebtn svg{width:15px;height:15px;}

  /* anchored action menu */
  .action-menu{
    position:fixed;z-index:90;min-width:210px;
    background:var(--surface);border:1px solid var(--line);border-radius:13px;
    padding:6px;box-shadow:0 16px 40px rgba(27,23,38,.22);
    animation:menupop .12s ease;
  }
  @keyframes menupop{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
  .am-item{
    width:100%;display:flex;align-items:center;gap:11px;
    padding:10px 11px;border-radius:9px;font-size:.88rem;color:var(--ink);text-align:left;
  }
  .am-item:hover{background:var(--paper);}
  .am-item svg{width:16px;height:16px;color:var(--muted);flex:none;}
  .am-item.danger{color:var(--danger);}
  .am-item.danger svg{color:var(--danger);}
  .am-sep{height:1px;background:var(--line);margin:5px 8px;}

  /* ---------- Composer ---------- */
  .composer{
    padding:14px 20px calc(14px + env(safe-area-inset-bottom));
    background:var(--surface);border-top:1px solid var(--line);
  }
  .pending{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .pending:empty{display:none;}
  .chip{
    display:flex;align-items:center;gap:8px;background:var(--paper);
    border:1px solid var(--line);border-radius:10px;padding:7px 9px;font-size:.8rem;max-width:230px;
  }
  .chip .ico{width:24px;height:24px;border-radius:7px;background:var(--self);display:grid;place-items:center;flex:none;}
  .chip .ico svg{width:13px;height:13px;color:#fff;}
  .chip b{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
  .chip .x{margin-left:2px;color:var(--muted);font-size:1rem;line-height:1;padding:2px;}
  .chip .x:hover{color:var(--danger);}

  .inbar{display:flex;align-items:flex-end;gap:10px;}
  .attach,.send{width:44px;height:44px;border-radius:13px;flex:none;display:grid;place-items:center;transition:background .15s,transform .1s;}
  .attach{color:var(--muted);}
  .attach:hover{background:var(--paper);color:var(--self);}
  .attach svg{width:21px;height:21px;}
  .field{flex:1;}
  .field textarea{
    width:100%;resize:none;border:1px solid var(--line);background:var(--paper);
    border-radius:15px;padding:12px 15px;font-family:inherit;font-size:.94rem;
    color:var(--ink);line-height:1.45;max-height:160px;outline:none;transition:border-color .15s;
  }
  .field textarea:focus{border-color:var(--self);}
  .field textarea::placeholder{color:var(--muted);}
  .send{background:var(--self);color:#fff;}
  .send:hover{background:var(--self-hi);}
  .send:active{transform:scale(.94);}
  .send:disabled{background:var(--line);color:var(--muted);cursor:default;transform:none;}
  .send svg{width:20px;height:20px;}

  /* voice recording state */
  #recBtn:hover{color:var(--danger);}
  .cancelrec{color:var(--danger)!important;}
  .recwrap{flex:1;display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:15px;padding:12px 15px;}
  .recdot{width:11px;height:11px;border-radius:50%;background:var(--danger);flex:none;animation:blink 1.1s infinite;}
  @keyframes blink{50%{opacity:.25;}}
  .rectime{font-family:"JetBrains Mono",monospace;font-size:.92rem;font-weight:500;color:var(--ink);}
  .rechint{font-size:.8rem;color:var(--muted);}

  /* voice-note player inside a bubble */
  .att.voice{cursor:default;}
  .att.voice .vplay{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;flex:none;color:#fff;}
  .att.voice .vplay:hover{background:rgba(255,255,255,.34);}
  .att.voice .vplay svg{width:16px;height:16px;}
  .att.voice .vbar{flex:1;height:4px;border-radius:4px;background:rgba(255,255,255,.25);overflow:hidden;}
  .att.voice .vfill{height:100%;width:0;background:#fff;border-radius:4px;transition:width .1s linear;}
  .att.voice .vtime{font-family:"JetBrains Mono",monospace;font-size:.68rem;opacity:.85;flex:none;}

  /* ---------- Empty main ---------- */
  .blank{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px;color:var(--muted);
  }
  .blank .glyph{width:64px;height:64px;border-radius:20px;background:linear-gradient(150deg,var(--self-hi),var(--self));
    display:grid;place-items:center;margin-bottom:18px;box-shadow:0 10px 30px rgba(87,75,144,.3);}
  .blank .glyph svg{width:30px;height:30px;color:#fff;}
  .blank h3{font-family:"Bricolage Grotesque",sans-serif;font-size:1.3rem;color:var(--ink);margin:0 0 6px;}
  .blank p{font-size:.9rem;line-height:1.55;max-width:300px;margin:0;}

  /* ---------- Modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(27,23,38,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;backdrop-filter:blur(2px);}
  .scrim.on{display:flex;}
  .dialog{background:var(--surface);border-radius:20px;padding:24px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(27,23,38,.35);animation:dialogIn .2s cubic-bezier(.2,.8,.2,1);}
  @keyframes dialogIn{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:none;}}
  .dialog h3{font-family:"Bricolage Grotesque",sans-serif;font-size:1.2rem;margin:0 0 6px;}
  .dialog p{font-size:.86rem;color:var(--muted);margin:0 0 18px;line-height:1.5;}
  .dialog input{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-family:inherit;font-size:.95rem;outline:none;}
  .dialog input:focus{border-color:var(--self);}
  .dialog .btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
  .dialog button{padding:10px 18px;border-radius:11px;font-size:.88rem;font-weight:500;}
  .dialog .ghost{color:var(--muted);}
  .dialog .ghost:hover{background:var(--paper);}
  .dialog .go{background:var(--self);color:#fff;}
  .dialog .go:hover{background:var(--self-hi);}
  .dialog .go.danger{background:var(--danger);}

  /* ---------- Mobile ---------- */
  @media (max-width:760px){
    .app{grid-template-columns:1fr;}
    .side{width:100%;}
    .main{display:none;}
    .app.show-thread .side{display:none;}
    .app.show-thread .main{display:flex;}
    .back{display:grid;}
    .msg{max-width:84%;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
  }
</style>

<script>
/* ============================================================
   ECHO — self-notes, messaging style
   Storage is a swappable layer. Ships on LOCAL storage.
   Flip CONFIG.STORAGE_MODE to 'drive' + add your Client ID
   (and host on a whitelisted domain) to sync across devices.
   ============================================================ */

const CONFIG = {
  // 'local'  = this device only (no account, no sync)
  // 'cloud'  = Supabase login + index/text  +  Google Drive file vault   <-- the cross-device setup
  STORAGE_MODE: 'local',

  // --- Supabase (identity + the lightweight index of threads/messages) ---
  SUPABASE_URL: '',               // e.g. https://xxxx.supabase.co
  SUPABASE_ANON_KEY: '',          // the public anon key (safe to ship in frontend)

  // --- Google Drive (the file vault for attachments & voice notes) ---
  // In cloud mode the Drive access token comes from your Supabase Google login,
  // so there is ONE sign-in. Add the Drive scope in Supabase → Auth → Google.
  GOOGLE_CLIENT_ID: '',           // only needed for standalone 'drive' mode (no Supabase)
  DRIVE_STATE_FILE: 'echo-data.json',
};

/* ---------- icons ---------- */
const I = {
  send:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"/></svg>',
  clip:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.4 11.05 12.25 20.2a5 5 0 0 1-7.07-7.07l9.19-9.19a3 3 0 0 1 4.24 4.24l-9.2 9.19a1 1 0 0 1-1.41-1.41l8.49-8.49"/></svg>',
  file:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>',
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
  find:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>',
  more:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>',
  pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1Z"/></svg>',
  copy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  rename:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>',
  ghost:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7A8.38 8.38 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.5 8.5 0 0 1 21 11.5Z"/></svg>',
  mic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3"/></svg>',
  stop:'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg>',
  play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
  pause:'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>',
  speaker:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg>',
  chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>',
  folder:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h5l2 3h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/></svg>',
  reply:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17 4 12l5-5"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>',
  quote:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>',
  bell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg>',
  palette:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="1.2"/><circle cx="17.5" cy="10.5" r="1.2"/><circle cx="8.5" cy="7.5" r="1.2"/><circle cx="6.5" cy="12.5" r="1.2"/><path d="M12 2a10 10 0 1 0 0 20 2.5 2.5 0 0 0 0-5 1.5 1.5 0 0 1 0-3h2.5a4.5 4.5 0 0 0 4.5-4.5A8 8 0 0 0 12 2Z"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  close:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
};

/* ---------- swappable storage ---------- */
// Local store: localStorage when available, else in-memory (e.g. sandboxed preview).
const LocalStore = (() => {
  const KEY = 'echo:data:v1';
  let mem = null;
  function ok(){ try{ const k='__e';localStorage.setItem(k,'1');localStorage.removeItem(k);return true;}catch(e){return false;} }
  const has = ok();
  return {
    name:'local',
    async load(){
      if(has){ const r=localStorage.getItem(KEY); return r?JSON.parse(r):null; }
      return mem;
    },
    async save(data){
      if(has){ try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){console.warn('save failed (quota?)',e);} }
      else mem = data;
    },
    // local attachments are inlined as data URLs already
    async putFile(file){ return await fileToDataUrl(file); },
    async fileUrl(ref){ return ref; },
  };
})();

// Drive store: syncs one JSON state file + uploads attachments to Drive.
// Experimental — requires CONFIG.GOOGLE_CLIENT_ID and a hosted, whitelisted origin.
const DriveStore = (() => {
  let token = null, stateFileId = null, ready = false;
  function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
  async function auth(){
    await loadScript('https://accounts.google.com/gsi/client');
    return new Promise((res,rej)=>{
      const tc = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/drive.file',
        callback:(r)=>{ if(r.access_token){token=r.access_token;res();} else rej(r); },
      });
      tc.requestAccessToken();
    });
  }
  async function api(path,opts={}){
    const r = await fetch('https://www.googleapis.com'+path,{...opts,headers:{Authorization:'Bearer '+token,...(opts.headers||{})}});
    if(!r.ok) throw new Error('Drive '+r.status);
    return r;
  }
  async function findStateFile(){
    const q = encodeURIComponent("name='"+CONFIG.DRIVE_STATE_FILE+"'");
    const r = await api('/drive/v3/files?spaces=appDataFolder&q='+q+'&fields=files(id,name)');
    const j = await r.json();
    return j.files && j.files[0] ? j.files[0].id : null;
  }
  return {
    name:'drive',
    async init(){ if(ready)return; if(!CONFIG.GOOGLE_CLIENT_ID) throw new Error('Set GOOGLE_CLIENT_ID'); await auth(); stateFileId = await findStateFile(); ready=true; },
    async load(){
      await this.init();
      if(!stateFileId) return null;
      const r = await api('/drive/v3/files/'+stateFileId+'?alt=media');
      return await r.json();
    },
    async save(data){
      await this.init();
      const body = JSON.stringify(data);
      if(!stateFileId){
        const meta = {name:CONFIG.DRIVE_STATE_FILE, parents:['appDataFolder']};
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(meta)],{type:'application/json'}));
        form.append('file', new Blob([body],{type:'application/json'}));
        const r = await api('/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',body:form});
        stateFileId = (await r.json()).id;
      } else {
        await api('/upload/drive/v3/files/'+stateFileId+'?uploadType=media',{method:'PATCH',headers:{'Content-Type':'application/json'},body});
      }
    },
    async putFile(file){
      await this.init();
      const meta = {name:file.name};
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(meta)],{type:'application/json'}));
      form.append('file', file);
      const r = await api('/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',body:form});
      return 'drive:'+(await r.json()).id;   // store a reference, not the bytes
    },
    async fileUrl(ref){
      await this.init();
      const id = ref.replace('drive:','');
      const r = await api('/drive/v3/files/'+id+'?alt=media');
      return URL.createObjectURL(await r.blob());
    },
  };
})();

// Cloud store: Supabase holds identity + the state index/text (one jsonb row per user),
// Google Drive holds the heavy files. The Drive token rides along from the Supabase
// Google login, so there is a single sign-in. Blueprint — verify with your own project.
const CloudStore = (() => {
  let sb=null, user=null, driveToken=null, ready=false, refreshing=null;
  function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
  async function refreshDriveToken(){
    // Asks the Supabase Edge Function to mint a fresh Google token from the stored refresh token.
    if(refreshing)return refreshing;
    refreshing=(async()=>{
      const {data,error}=await sb.functions.invoke('refresh-drive-token');
      if(error||!data?.access_token) throw new Error('Could not refresh Drive access');
      driveToken=data.access_token; return driveToken;
    })().finally(()=>{refreshing=null;});
    return refreshing;
  }
  async function drive(path,opts={},retry=true){
    if(!driveToken){ try{ await refreshDriveToken(); }catch(e){ throw new Error('No Drive access — sign in again'); } }
    const r=await fetch('https://www.googleapis.com'+path,{...opts,headers:{Authorization:'Bearer '+driveToken,...(opts.headers||{})}});
    if(r.status===401 && retry){ await refreshDriveToken(); return drive(path,opts,false); }  // token expired → renew once, retry
    if(!r.ok) throw new Error('Drive '+r.status);
    return r;
  }
  return {
    name:'cloud',
    async init(){
      if(ready)return;
      if(!CONFIG.SUPABASE_URL||!CONFIG.SUPABASE_ANON_KEY) throw new Error('Set SUPABASE_URL and SUPABASE_ANON_KEY');
      await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
      sb=supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
      const {data:{session}}=await sb.auth.getSession();
      if(!session){
        // One sign-in. access_type=offline + consent => Google returns a refresh token we can store.
        await sb.auth.signInWithOAuth({provider:'google',options:{
          scopes:'https://www.googleapis.com/auth/drive.file',
          redirectTo:location.href.split('#')[0],
          queryParams:{access_type:'offline',prompt:'consent'},
        }});
        return; // page navigates; init resumes on reload
      }
      user=session.user;
      driveToken=session.provider_token||null;
      // Stash the refresh token (server-only thereafter) so the Edge Function can renew Drive access.
      if(session.provider_refresh_token){
        try{ await sb.from('echo_google_tokens').upsert({user_id:user.id,refresh_token:session.provider_refresh_token}); }catch(e){ console.warn('token store failed',e); }
      }
      ready=true;
    },
    async load(){
      await this.init(); if(!ready)return null;
      const {data,error}=await sb.from('echo_state').select('state').eq('user_id',user.id).maybeSingle();
      if(error)throw error;
      return data?data.state:null;
    },
    async save(data){
      await this.init(); if(!ready)return;
      const {error}=await sb.from('echo_state').upsert({user_id:user.id,state:data,updated_at:new Date().toISOString()});
      if(error)console.warn('cloud save failed',error);
    },
    async putFile(file){
      await this.init();
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify({name:file.name})],{type:'application/json'}));
      form.append('file',file);
      const r=await drive('/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',body:form});
      return 'drive:'+(await r.json()).id;
    },
    async fileUrl(ref){
      await this.init();
      const id=ref.replace('drive:','');
      const r=await drive('/drive/v3/files/'+id+'?alt=media');
      return URL.createObjectURL(await r.blob());
    },
    async signOut(){ if(sb)await sb.auth.signOut(); location.reload(); },
    getProfile(){ return user? {email:user.email, name:user.user_metadata?.full_name||user.user_metadata?.name||'', avatar:user.user_metadata?.avatar_url||''} : null; },
  };
})();

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const PALETTE = ['#574B90','#3F7E73','#B5683E','#4C6FB1','#9A4F7A','#5E7A3C','#A8843C','#6B5BC0'];
const colorFor = id => PALETTE[[...id].reduce((a,c)=>a+c.charCodeAt(0),0)%PALETTE.length];
const initials = n => (n.trim()[0]||'·').toUpperCase();
function fileToDataUrl(file){return new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file);});}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(0)+' KB';return (b/1048576).toFixed(1)+' MB';}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// Autolink URLs, emails, and phone numbers. Tokenize so we never wrap inside an existing link.
function linkify(s){
  let out=esc(s);
  const slots=[]; const stash=html=>{slots.push(html);return '\u0000'+(slots.length-1)+'\u0000';};
  out=out.replace(/(https?:\/\/[^\s<]+)/g,m=>stash(`<a href="${m}" target="_blank" rel="noopener">${m}</a>`));
  out=out.replace(/([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,})/g,m=>stash(`<a href="mailto:${m}">${m}</a>`));
  // phone: optional +, then 7+ digits allowing spaces, dashes, dots, parens
  out=out.replace(/(?:(?:\+\d{1,3}[\s.-]?)?(?:\(\d{1,4}\)[\s.-]?)?\d(?:[\d\s.-]{6,}\d))/g,m=>{
    const digits=m.replace(/[^\d+]/g,''); if(digits.replace(/\D/g,'').length<7)return m;
    return stash(`<a href="tel:${digits}">${m}</a>`);
  });
  return out.replace(/\u0000(\d+)\u0000/g,(_,i)=>slots[+i]);
}
function fmtTime(ts){return new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});}
function dayLabel(ts){
  const d=new Date(ts), n=new Date();
  const same=(a,b)=>a.toDateString()===b.toDateString();
  if(same(d,n))return 'Today';
  const y=new Date(n);y.setDate(n.getDate()-1);
  if(same(d,y))return 'Yesterday';
  return d.toLocaleDateString([], {month:'short',day:'numeric',year:d.getFullYear()!==n.getFullYear()?'numeric':undefined});
}

/* ---------- render: threads ---------- */
function threadRow(t){
  const msgs = state.messages[t.id]||[];
  const last = msgs[msgs.length-1];
  let prev = 'No messages yet';
  if(last){ prev = last.text ? last.text : (last.attachments.length?('📎 '+last.attachments[0].name):'…'); }
  return `<div class="thread ${t.id===state.activeId?'active':''} ${t.pinned?'is-pinned':''}" data-id="${t.id}">
    <div class="tav" style="background:${colorFor(t.id)}">${esc(initials(t.name))}</div>
    <div class="body">
      <div class="row1"><span class="name">${t.pinned?'<span class="pinmark">'+I.pin+'</span>':''}${esc(t.name)}</span>
        <span class="time">${last?fmtTime(last.ts):''}</span></div>
      <div class="preview">${esc(prev).slice(0,60)}</div>
    </div>
    <button class="thread-pin" data-pin="${t.id}" title="${t.pinned?'Unpin thread':'Pin thread'}">${I.pin}</button>

function renderThreads(){
  const term = $('#threadSearch').value.trim().toLowerCase();
  const list = $('#threadList');
  if(!state.threads.length){
    list.innerHTML='<div class="empty-side">No threads yet.<br>Start one — it\'s just you in here.</div>';return;
  }
  const match=t=>!term || t.name.toLowerCase().includes(term);
  const sortT=arr=>arr.slice().sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0) || b.lastActivity-a.lastActivity);
  let html='';
  // folders first, each with its threads
  state.folders.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach(f=>{
    const inF=sortT(state.threads.filter(t=>t.folderId===f.id && match(t)));
    if(term && !inF.length)return;
    html+=`<div class="folder ${f.collapsed?'collapsed':''}" data-folder="${f.id}">
      <span class="fchev">${I.chev}</span>
      <span class="ficon">${I.folder}</span>
      <span class="fname">${esc(f.name)}</span>
      <span class="fcount">${inF.length}</span>
      <button class="fmenu" data-fmenu="${f.id}" title="Folder options">${I.more}</button>
    </div>`;
    html+=`<div class="folder-body ${f.collapsed?'collapsed':''}" data-fbody="${f.id}">${inF.map(threadRow).join('')}</div>`;
  });
  // ungrouped threads
  const loose=sortT(state.threads.filter(t=>!t.folderId && match(t)));
  if(loose.length){
    if(state.folders.length) html+=`<div class="folder-label">Threads</div>`;
    html+=loose.map(threadRow).join('');
  }
  if(!html){ html='<div class="empty-side">No threads match “'+esc(term)+'”.</div>'; }
  list.innerHTML=html;
  list.querySelectorAll('.thread').forEach(el=>el.onclick=e=>{ if(e.target.closest('.thread-pin'))return; openThread(el.dataset.id); });
  list.querySelectorAll('.thread-pin').forEach(b=>b.onclick=e=>{ e.stopPropagation(); toggleThreadPin(b.dataset.pin); });
  list.querySelectorAll('.folder').forEach(el=>el.onclick=e=>{
    if(e.target.closest('.fmenu'))return;
    const f=state.folders.find(x=>x.id===el.dataset.folder); if(!f)return;
    f.collapsed=!f.collapsed;
    el.classList.toggle('collapsed',f.collapsed);                                  // animate via class, no rebuild
    const body=list.querySelector(`.folder-body[data-fbody="${f.id}"]`);
    if(body)body.classList.toggle('collapsed',f.collapsed);
    persist();
  });
  list.querySelectorAll('.fmenu').forEach(b=>b.onclick=e=>{ e.stopPropagation(); folderMenu(state.folders.find(x=>x.id===b.dataset.fmenu)); });
}
function toggleThreadPin(id){ const t=state.threads.find(x=>x.id===id); if(t){t.pinned=!t.pinned; renderThreads(); persist();} }

function renderStream(){
  const wrap=$('#stream'); if(!wrap)return;
  const msgs=(state.messages[state.activeId]||[]);
  const view = findTerm ? msgs.filter(m=>(m.text||'').toLowerCase().includes(findTerm)) : msgs;
  if(!msgs.length){
    wrap.innerHTML=`<div class="blank"><div class="glyph">${I.ghost}</div><h3>Empty thread</h3><p>Say something to yourself. Notes, links, files — they\'ll stack up here.</p></div>`;return;
  }
  if(!view.length){ wrap.innerHTML='<div class="blank"><p>Nothing matches “'+esc(findTerm)+'” in this thread.</p></div>';return; }
  let html='', lastDay='';
  view.forEach(m=>{
    const dl=dayLabel(m.ts);
    if(dl!==lastDay && !findTerm){ html+=`<div class="daysep">${dl}</div>`; lastDay=dl; }
    html+=`<div class="msg" data-id="${m.id}">
      <div class="acts"><button class="morebtn" title="Message actions">${I.more}</button></div>
      <div class="bubble ${m.pinned?'pinned':''}">
        ${m.quote?quoteHtml(m.quote):''}
        ${m.text?`<div class="txt">${renderBody(m.text,m.id)}</div>`:''}
        ${m.attachments.map(a=>attHtml(a)).join('')}
        ${m.remindAt?`<div class="remind-chip ${m.remindAt<Date.now()?'past':''}">${I.bell}<span>${reminderLabel(m.remindAt)}</span><button class="remind-x" title="Clear reminder">${I.close}</button></div>`:''}
      </div>
      <div class="stamp">${m.pinned?'<span class="pin">'+I.pin+'</span>':''}${fmtTime(m.ts)}</div>
    </div>`;
  });
  wrap.innerHTML=html;
  // wire actions + lazy attachment urls
  wrap.querySelectorAll('.msg').forEach(el=>{
    const id=el.dataset.id;
    const menuItems=()=>{
      const m=findMsg(id); if(!m)return [];
      const items=[
        {label:'Reply', icon:I.reply, run:()=>startReply(id)},
        {label:'Quote in another thread', icon:I.quote, run:()=>startQuoteElsewhere(id)},
        {label:m.remindAt?'Change reminder':'Remind me', icon:I.bell, run:()=>remindMenu(id)},
        {label:m.pinned?'Unpin':'Pin', icon:I.pin, run:()=>togglePin(id)},
      ];
      if(m.text){
        items.push({label:'Read aloud', icon:I.speaker, run:()=>speak(m.text)});
        items.push({label:'Copy text', icon:I.copy, run:()=>{navigator.clipboard?.writeText(m.text);toast('Copied');}});
      }
      items.push({sep:true});
      items.push({label:'Delete', icon:I.trash, danger:true, run:()=>deleteMsg(id)});
      return items;
    };
    el.querySelector('.morebtn').onclick=e=>{ e.stopPropagation(); openActionMenu(el.querySelector('.morebtn'), menuItems()); };
    const rx=el.querySelector('.remind-x'); if(rx)rx.onclick=e=>{e.stopPropagation();clearReminder(id);};
    el.querySelectorAll('.todo').forEach(box=>box.onclick=()=>toggleTodo(id,+box.dataset.line));
    const q=el.querySelector('.quote'); if(q&&q.dataset.tid)q.onclick=()=>jumpTo(q.dataset.tid,q.dataset.mid);
    // touch: a tap on the bubble opens the action menu directly (no hover on touch)
    if(isTouch()){
      el.querySelector('.bubble').onclick=ev=>{
        if(ev.target.closest('a,.todo,.quote,.remind-x'))return;
        openActionMenu(el.querySelector('.bubble'), menuItems());
      };
    }
  });
  wrap.querySelectorAll('.att[data-ref]').forEach(el=>{
    if(el.dataset.audio==='1'){ initAudioPlayer(el); return; }   // audio handled separately
    el.onclick=async()=>{ try{ const url=await Store.fileUrl(el.dataset.ref); window.open(url,'_blank'); }catch(e){ alert('Could not open file: '+e.message); } };
    if(el.dataset.img==='1'){ Store.fileUrl(el.dataset.ref).then(url=>{const img=document.createElement('img');img.className='thumb';img.src=url;el.appendChild(img);}).catch(()=>{}); }
  });
  if(!findTerm) wrap.scrollTop=wrap.scrollHeight;
}

// Render message body: checklist lines become tappable, the rest is autolinked.
function renderBody(text,msgId){
  const lines=text.split('\n');
  return lines.map((ln,i)=>{
    const m=ln.match(/^(\s*)(?:[-*]\s+)?\[([ xX])\]\s+(.*)$/);
    if(m){
      const done=m[2].toLowerCase()==='x';
      return `<div class="todo-row"><button class="todo ${done?'done':''}" data-line="${i}">${done?I.check:''}</button><span class="${done?'todo-done':''}">${linkify(m[3])}</span></div>`;
    }
    return `<div class="bodyline">${linkify(ln)||'&nbsp;'}</div>`;
  }).join('');
}
function toggleTodo(msgId,line){
  const m=findMsg(msgId); if(!m)return;
  const lines=m.text.split('\n');
  lines[line]=lines[line].replace(/\[([ xX])\]/,(_,c)=>c.toLowerCase()==='x'?'[ ]':'[x]');
  m.text=lines.join('\n'); renderStream(); persist();
}
function quoteHtml(q){
  return `<div class="quote" data-tid="${esc(q.threadId)}" data-mid="${esc(q.msgId)}">
    <span class="qname">${esc(q.name||'Note')}</span>
    <span class="qtext">${esc(q.snippet)}</span>
  </div>`;
}

/* ---------- anchored action menu (one ⋯ per message) ---------- */
let openMenuEl=null;
function closeActionMenu(){ if(openMenuEl){ openMenuEl.remove(); openMenuEl=null; document.removeEventListener('click',onDocMenuClick,true); document.removeEventListener('keydown',onMenuKey,true); } }
function onDocMenuClick(e){ if(openMenuEl && !openMenuEl.contains(e.target)) closeActionMenu(); }
function onMenuKey(e){ if(e.key==='Escape') closeActionMenu(); }
function openActionMenu(anchor, items){
  closeActionMenu();
  if(!items.length)return;
  const menu=document.createElement('div'); menu.className='action-menu';
  menu.innerHTML=items.map((it,i)=> it.sep
    ? '<div class="am-sep"></div>'
    : `<button class="am-item ${it.danger?'danger':''}" data-i="${i}">${it.icon||''}<span>${esc(it.label)}</span></button>`).join('');
  document.body.appendChild(menu);
  const r=anchor.getBoundingClientRect(), mw=menu.offsetWidth, mh=menu.offsetHeight, pad=10;
  let left=Math.max(pad, Math.min(r.right-mw, window.innerWidth-mw-pad));
  let top=r.bottom+6;
  if(top+mh>window.innerHeight-pad) top=Math.max(pad, r.top-mh-6);
  menu.style.left=left+'px'; menu.style.top=top+'px';
  menu.querySelectorAll('.am-item').forEach(b=>b.onclick=ev=>{ ev.stopPropagation(); const it=items[+b.dataset.i]; closeActionMenu(); it.run(); });
  openMenuEl=menu;
  setTimeout(()=>{ document.addEventListener('click',onDocMenuClick,true); document.addEventListener('keydown',onMenuKey,true); },0);
}

function attHtml(a){
  const type=a.type||'';
  if(type.startsWith('audio/')){
    return `<div class="att voice" data-ref="${esc(a.ref)}" data-audio="1">
      <button class="vplay">${I.play}</button>

  }

  return `<div class="att" data-ref="${esc(a.ref)}" data-img="${isImg?1:0}">
    <div class="ico">${I.file}</div>
    <div class="ai"><b>${esc(a.name)}</b><span>${fmtSize(a.size)}</span></div>
  </div>`;

function fmtDur(s){const m=Math.floor(s/60),x=Math.floor(s%60);return m+':'+String(x).padStart(2,'0');}

// Lazy custom audio player for voice notes
function initAudioPlayer(el){
  const playBtn=el.querySelector('.vplay'), fill=el.querySelector('.vfill'), time=el.querySelector('.vtime');
  let audio=null, loading=false;
  async function ensure(){
    if(audio||loading)return;
    loading=true;
    try{ const url=await Store.fileUrl(el.dataset.ref); audio=new Audio(url);
      audio.ontimeupdate=()=>{ if(audio.duration){fill.style.width=(audio.currentTime/audio.duration*100)+'%'; time.textContent=fmtDur(audio.currentTime);} };
      audio.onended=()=>{ playBtn.innerHTML=I.play; fill.style.width='0%'; if(audio.duration)time.textContent=fmtDur(audio.duration); };
      audio.onloadedmetadata=()=>{ if(isFinite(audio.duration))time.textContent=fmtDur(audio.duration); };
    }catch(e){ time.textContent='unavailable'; }
    loading=false;
  }
  playBtn.onclick=async()=>{
    await ensure(); if(!audio)return;
    if(audio.paused){ document.querySelectorAll('audio').forEach(a=>a!==audio&&a.pause()); audio.play(); playBtn.innerHTML=I.pause; }
    else { audio.pause(); playBtn.innerHTML=I.play; }
  };
}

// ---------- text-to-speech (read aloud) ----------
let ttsActive=null;
function speak(text,btn){
  if(!('speechSynthesis'in window)){ alert('This browser can’t read text aloud.'); return; }
  if(ttsActive){ speechSynthesis.cancel(); const prev=ttsActive.btn; ttsActive=null; if(prev)prev.innerHTML=I.speaker; if(prev===btn)return; }
  const u=new SpeechSynthesisUtterance(text);
  u.onend=()=>{ if(btn)btn.innerHTML=I.speaker; ttsActive=null; };
  ttsActive={btn}; if(btn)btn.innerHTML=I.stop;
  speechSynthesis.speak(u);
}

// ---------- voice notes (record + optional live transcription) ----------
let mediaRec=null, recChunks=[], recStart=0, recTimer=null, recognizer=null, recTranscript='';
async function startRecording(){
  if(!navigator.mediaDevices?.getUserMedia){ alert('Recording isn’t supported here.'); return; }
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ alert('Microphone permission is needed to record.'); return; }
  recChunks=[]; recTranscript='';
  mediaRec=new MediaRecorder(stream);
  mediaRec.ondataavailable=e=>{ if(e.data.size)recChunks.push(e.data); };
  mediaRec.onstop=()=>{ stream.getTracks().forEach(t=>t.stop()); finishRecording(); };
  mediaRec.start();
  recStart=Date.now();
  // best-effort live transcription
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){ try{ recognizer=new SR(); recognizer.continuous=true; recognizer.interimResults=false; recognizer.lang=navigator.language||'en-US';
    recognizer.onresult=e=>{ for(let i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal)recTranscript+=e.results[i][0].transcript+' '; } };
    recognizer.onerror=()=>{}; recognizer.start(); }catch(e){ recognizer=null; } }
  showRecordingUI();
}
function showRecordingUI(){
  const bar=$('#inbar'); if(!bar)return;
  bar.innerHTML=`<button class="attach cancelrec" id="cancelRec" title="Discard">${I.trash}</button>
    <div class="recwrap"><span class="recdot"></span><span class="rectime" id="recTime">0:00</span>
      <span class="rechint">recording${recognizer?' · transcribing':''}…</span></div>
    <button class="send" id="stopRec" title="Stop and attach">${I.stop}</button>`;
  $('#cancelRec').onclick=()=>cancelRecording();
  $('#stopRec').onclick=()=>{ if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop(); if(recognizer)try{recognizer.stop();}catch(e){} };
  recTimer=setInterval(()=>{ const t=Math.floor((Date.now()-recStart)/1000); const el=$('#recTime'); if(el)el.textContent=fmtDur(t); },300);
}
function cancelRecording(){
  if(mediaRec&&mediaRec.state!=='inactive'){ mediaRec.onstop=()=>mediaRec.stream?.getTracks().forEach(t=>t.stop()); mediaRec.stop(); }
  if(recognizer)try{recognizer.stop();}catch(e){}
  clearInterval(recTimer); mediaRec=null; recChunks=[]; recTranscript='';
  renderMain();
}
async function finishRecording(){
  clearInterval(recTimer);
  if(recognizer)try{recognizer.stop();}catch(e){} recognizer=null;
  const dur=Math.round((Date.now()-recStart)/1000);
  const blob=new Blob(recChunks,{type:'audio/webm'});
  const file=new File([blob],'Voice note.webm',{type:'audio/webm'});
  file._dur=dur;                       // carry duration for the chip/player
  pending.push(file);
  mediaRec=null;
  renderMain();                        // rebuild composer in normal state
  const input=$('#input');
  if(recTranscript.trim() && input){ input.value=recTranscript.trim(); input.dispatchEvent(new Event('input')); }
  renderPending();
}

function renderPending(){
  const el=$('#pending'); if(!el)return;
  el.innerHTML=pending.map((p,i)=>{
    const voice=(p.type||'').startsWith('audio/');
    const label=voice?('Voice note · '+fmtDur(p._dur||0)):p.name;
    return `<div class="chip"><div class="ico">${voice?I.mic:I.file}</div><b>${esc(label)}</b><button class="x" data-i="${i}">×</button></div>`;
  }).join('');
  el.querySelectorAll('.x').forEach(b=>b.onclick=()=>{pending.splice(+b.dataset.i,1);renderPending();const s=$('#sendBtn');if(s)s.disabled=!$('#input').value.trim()&&!pending.length;});
}

/* ---------- actions ---------- */
function isTouch(){return matchMedia('(pointer:coarse)').matches;}
function findMsg(id){return (state.messages[state.activeId]||[]).find(m=>m.id===id);}

function openThread(id){
  state.activeId=id; findTerm='';
  renderThreads(); renderMain();
  $('#app').classList.add('show-thread');
}

async function doSend(){
  const input=$('#input'); const text=input.value.trim();
  if(!text && !pending.length)return;
  const atts=[];
  for(const f of pending){
    try{ const ref=await Store.putFile(f); atts.push({name:f.name,size:f.size,type:f.type,ref,dur:f._dur||0}); }
    catch(e){ alert('Attachment failed: '+e.message); }
  }
  const msg={id:uid(),text,ts:Date.now(),pinned:false,attachments:atts};
  if(stagedQuote){ msg.quote=stagedQuote; stagedQuote=null; renderReplyBar(); }
  (state.messages[state.activeId] ||= []).push(msg);
  const t=state.threads.find(x=>x.id===state.activeId); if(t)t.lastActivity=Date.now();
  pending=[]; input.value=''; input.style.height='auto';
  renderStream(); renderPending(); renderThreads(); persist();
  const last=document.querySelector('#stream .msg:last-child'); if(last)last.classList.add('appear');
  $('#sendBtn').disabled=true;
}

/* ---------- reply / cross-thread quote ---------- */
function snippetOf(m){ const t=(m.text||'').replace(/\n/g,' ').trim(); return t?t.slice(0,90):(m.attachments?.length?('📎 '+m.attachments[0].name):'note'); }
function startReply(msgId){
  const m=findMsg(msgId); if(!m)return;
  const t=state.threads.find(x=>x.id===state.activeId);
  stagedQuote={threadId:state.activeId,msgId,snippet:snippetOf(m),name:'Reply to '+(t?t.name:'this thread')};
  renderReplyBar(); $('#input')?.focus();
}
function startQuoteElsewhere(msgId){
  const m=findMsg(msgId); if(!m)return;
  const src=state.threads.find(x=>x.id===state.activeId);
  const quote={threadId:state.activeId,msgId,snippet:snippetOf(m),name:'From '+(src?src.name:'a thread')};
  // pick a destination thread
  const opts=state.threads.map(t=>({id:t.id,label:t.name}));
  pickThread('Quote into which thread?',opts,destId=>{
    stagedQuote=quote;
    openThread(destId);
    setTimeout(()=>{ renderReplyBar(); $('#input')?.focus(); },0);
  });
}
function renderReplyBar(){
  const bar=$('#replyBar'); if(!bar)return;
  if(!stagedQuote){ bar.innerHTML=''; bar.classList.remove('on'); return; }
  bar.classList.add('on');
  bar.innerHTML=`<span class="rb-icon">${I.reply}</span>
    <div class="rb-body"><b>${esc(stagedQuote.name)}</b><span>${esc(stagedQuote.snippet)}</span></div>
    <button class="rb-x" title="Cancel">${I.close}</button>`;
  bar.querySelector('.rb-x').onclick=()=>{ stagedQuote=null; renderReplyBar(); };
}
function jumpTo(threadId,msgId){
  if(threadId!==state.activeId) openThread(threadId);
  setTimeout(()=>{
    const el=document.querySelector(`.msg[data-id="${msgId}"]`);
    if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),1200); }
    else toast('Original message not found');
  },60);
}

function togglePin(id){const m=findMsg(id);if(m){m.pinned=!m.pinned;renderStream();persist();}}
function deleteMsg(id){
  const arr=state.messages[state.activeId];
  const i=arr.findIndex(m=>m.id===id);
  if(i>-1){arr.splice(i,1);renderStream();renderThreads();persist();}
}

/* ---------- file picker ---------- */
$('#filePick').onchange=e=>{
  for(const f of e.target.files) pending.push(f);
  e.target.value=''; renderPending();
  const s=$('#sendBtn'); if(s)s.disabled=false;
};

/* ---------- new / rename / delete ---------- */
function threadMenu(t){
  dialog({
    title:'Thread', hint:'Rename, move to a folder, pin, or delete this thread.',
    value:t.name, ok:'Save name',
    secondBtn:{label:t.folderId?'Move to folder…':'Add to folder…', run:()=>moveToFolderMenu(t)},
    thirdBtn:{label:t.pinned?'Unpin from top':'Pin to top', run:()=>{toggleThreadPin(t.id);}},
    extraBtn:{label:'Delete thread', cls:'danger', run:()=>confirmDelete(t)},
    run:(name)=>{ if(name.trim()){t.name=name.trim();renderThreads();renderMain();persist();} }
  });
}
function moveToFolderMenu(t){
  const opts=[{id:'__none',label:'No folder'}, ...state.folders.map(f=>({id:f.id,label:f.name})), {id:'__new',label:'+ New folder…'}];
  pickThread('Move “'+t.name+'” to:',opts,choice=>{
    if(choice==='__new'){ dialog({title:'New folder',hint:'Group related threads together.',value:'',ok:'Create',run:(n)=>{ if(!n.trim())return; const f={id:uid(),name:n.trim(),collapsed:false}; state.folders.push(f); t.folderId=f.id; renderThreads(); persist(); }}); return; }
    t.folderId = choice==='__none'? null : choice;
    renderThreads(); persist();
  });
}
function confirmDelete(t){
  dialog({
    title:'Delete “'+t.name+'”?', hint:'This removes the thread and its messages on this device. Can’t be undone.',
    value:null, ok:'Delete', okCls:'danger',
    run:()=>{
      state.threads=state.threads.filter(x=>x.id!==t.id);
      delete state.messages[t.id];
      if(state.activeId===t.id)state.activeId=state.threads[0]?.id||null;
      $('#app').classList.remove('show-thread');
      renderThreads(); renderMain(); persist();
    }
  });
}

/* ---------- folders ---------- */
$('#newFolder').onclick=()=>dialog({
  title:'New folder', hint:'A place to group related threads — “Work”, “Home”, “2026”.',
  value:'', ok:'Create', run:(name)=>{
    if(!name.trim())return;
    state.folders.push({id:uid(),name:name.trim(),collapsed:false});
    renderThreads(); persist();
  }
});
function folderMenu(f){
  if(!f)return;
  dialog({
    title:'Folder', hint:'Rename or remove this folder. Removing it keeps the threads, just ungrouped.',
    value:f.name, ok:'Save name',
    extraBtn:{label:'Remove folder', cls:'danger', run:()=>{
      state.threads.forEach(t=>{ if(t.folderId===f.id)t.folderId=null; });
      state.folders=state.folders.filter(x=>x.id!==f.id);
      renderThreads(); persist();
    }},
    run:(name)=>{ if(name.trim()){f.name=name.trim();renderThreads();persist();} }
  });
}

/* ---------- a simple chooser (used by quote + move-to-folder) ---------- */
function pickThread(title,options,onPick){
  const d=$('#dialog');
  d.innerHTML=`<h3>${esc(title)}</h3>
    <div class="picklist">${options.map(o=>`<button class="pick" data-id="${esc(o.id)}">${esc(o.label)}</button>`).join('')}</div>
    <div class="btns"><button class="ghost" id="dlgCancel">Cancel</button></div>`;
  $('#scrim').classList.add('on');
  d.querySelectorAll('.pick').forEach(b=>b.onclick=()=>{ closeDialog(); onPick(b.dataset.id); });
  $('#dlgCancel').onclick=closeDialog;
}

/* ---------- reminders (fire while the app is open) ---------- */
function requestNotifyIfNeeded(){ try{ if('Notification'in window && Notification.permission==='default'){ /* asked lazily on first set */ } }catch(e){} }
function reminderLabel(ts){
  const d=new Date(ts), now=Date.now();
  const day = ts<now ? 'overdue · ' : '';
  const same=new Date().toDateString()===d.toDateString();
  return day + (same?'today ':d.toLocaleDateString([], {month:'short',day:'numeric'})+' ') + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}
function remindMenu(msgId){
  const now=new Date();
  const evening=new Date(now); evening.setHours(18,0,0,0); if(evening<now)evening.setDate(evening.getDate()+1);
  const tomorrow=new Date(now); tomorrow.setDate(now.getDate()+1); tomorrow.setHours(9,0,0,0);
  const opts=[
    {id:String(now.getTime()+3600000),label:'In 1 hour'},
    {id:String(now.getTime()+10800000),label:'In 3 hours'},
    {id:String(evening.getTime()),label:'This evening (6pm)'},
    {id:String(tomorrow.getTime()),label:'Tomorrow morning (9am)'},
    {id:'__custom',label:'Pick a time…'},
    {id:'__clear',label:'Clear reminder'},
  ];
  pickThread('Remind me about this…',opts,choice=>{
    if(choice==='__clear'){ clearReminder(msgId); return; }
    if(choice==='__custom'){ customReminder(msgId); return; }
    setReminder(msgId,+choice);
  });
}
function customReminder(msgId){
  const d=$('#dialog');
  const def=new Date(Date.now()+3600000); const pad=n=>String(n).padStart(2,'0');
  const val=`${def.getFullYear()}-${pad(def.getMonth()+1)}-${pad(def.getDate())}T${pad(def.getHours())}:${pad(def.getMinutes())}`;
  d.innerHTML=`<h3>Pick a time</h3><p>Reminder fires while Echo is open in a tab.</p>
    <input type="datetime-local" id="dtInput" value="${val}">
    <div class="btns"><button class="ghost" id="dlgCancel">Cancel</button><button class="go" id="dlgOk">Set reminder</button></div>`;
  $('#scrim').classList.add('on');
  $('#dlgCancel').onclick=closeDialog;
  $('#dlgOk').onclick=()=>{ const v=$('#dtInput').value; if(v)setReminder(msgId,new Date(v).getTime()); closeDialog(); };
}
async function setReminder(msgId,ts){
  const m=findMsg(msgId); if(!m)return;
  m.remindAt=ts; renderStream(); persist();
  try{ if('Notification'in window && Notification.permission==='default') await Notification.requestPermission(); }catch(e){}
  scheduleReminders();
  toast('Reminder set · '+reminderLabel(ts));
}
function clearReminder(msgId){ const m=findMsg(msgId); if(m){ delete m.remindAt; renderStream(); persist(); } }
let reminderTimers=[];
function scheduleReminders(){
  reminderTimers.forEach(clearTimeout); reminderTimers=[];
  const now=Date.now();
  Object.entries(state.messages).forEach(([tid,arr])=>arr.forEach(m=>{
    if(m.remindAt && m.remindAt>now){
      const delay=Math.min(m.remindAt-now, 2147483000);   // setTimeout max
      reminderTimers.push(setTimeout(()=>fireReminder(tid,m.id),delay));
    }
  }));
}
function fireReminder(tid,msgId){
  const arr=state.messages[tid]||[]; const m=arr.find(x=>x.id===msgId); if(!m)return;
  const t=state.threads.find(x=>x.id===tid);
  const body=snippetOf(m);
  try{
    if('Notification'in window && Notification.permission==='granted'){
      const n=new Notification('Echo · '+(t?t.name:'Reminder'),{body});
      n.onclick=()=>{ window.focus(); jumpTo(tid,msgId); };
    } else { toast('⏰ '+(t?t.name+': ':'')+body.slice(0,60)); }
  }catch(e){ toast('⏰ '+body.slice(0,60)); }
  if(state.activeId===tid)renderStream();
}

/* ---------- colour schemes ---------- */
const THEMES={
  plum:    {label:'Plum',    swatch:'#574B90', vars:{}},
  forest:  {label:'Forest',  swatch:'#3F7E73', vars:{'--self':'#357567','--self-hi':'#43917f','--accent':'#E2A33C'}},
  ember:   {label:'Ember',   swatch:'#C2683C', vars:{'--self':'#BB5E36','--self-hi':'#d27044','--accent':'#E0B23C'}},
  ocean:   {label:'Ocean',   swatch:'#3D6FB0', vars:{'--self':'#3A66A6','--self-hi':'#4d7fc4','--accent':'#E8A23D'}},
  midnight:{label:'Midnight',swatch:'#1B1726', dark:true, vars:{
    '--paper':'#16131F','--surface':'#1E1A2B','--ink':'#ECE8F4','--muted':'#8C84A0','--line':'#2A2538',
    '--self':'#6A5CAE','--self-hi':'#7d6fc4','--accent':'#E8A23D'
  }},
};
function applyTheme(key){
  const base={'--paper':'#FAF8F4','--surface':'#FFFFFF','--ink':'#221E2E','--muted':'#857E95','--line':'#ECE6DD','--self':'#574B90','--self-hi':'#6A5CAE','--accent':'#E8A23D'};
  const t=THEMES[key]||THEMES.plum;
  Object.entries(base).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
  Object.entries(t.vars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
  document.body.classList.toggle('dark', !!t.dark);
  const btn=$('#themeBtn'); if(btn)btn.style.background=t.swatch;
}
function openSettings(){
  const d=$('#dialog');
  const signedIn=!!account;
  const acctHtml = Store.name==='cloud'
    ? (signedIn
        ? `<div class="set-acct">
             <div class="set-acct-row"><span class="dot ok"></span><div><b>Signed in with Google</b><span>${esc(account.email)}</span></div></div>
             <button class="go danger" id="setLogout">Log out</button>
           </div>`
        : `<p class="set-note">Not signed in.</p>`)
    : `<p class="set-note">Running locally on this device. Sign-in and cross-device sync are available in cloud mode.</p>`;

  d.innerHTML=`<div class="set-head">
      <div class="set-av">${state.avatarUrl?`<img src="${esc(state.avatarUrl)}" alt="">`:esc(initials(state.displayName||'You'))}</div>
      <h3>Settings</h3>
    </div>
    <label class="set-label">Display name</label>
    <input id="setName" value="${esc(state.displayName||'')}" placeholder="${esc(account?.name||'You')}">
    <label class="set-label">Colour scheme</label>
    <div class="themegrid">${Object.entries(THEMES).map(([k,t])=>`
      <button class="themecard ${k===state.theme?'on':''}" data-theme="${k}">
        <span class="sw" style="background:${t.swatch}"></span>${esc(t.label)}
      </button>`).join('')}</div>
    <label class="set-label">Account</label>
    ${acctHtml}
    <div class="btns"><button class="go" id="setDone">Done</button></div>`;
  $('#scrim').classList.add('on');
  d.querySelectorAll('.themecard').forEach(b=>b.onclick=()=>{ state.theme=b.dataset.theme; applyTheme(state.theme); persist(); d.querySelectorAll('.themecard').forEach(x=>x.classList.toggle('on',x===b)); });
  const saveName=()=>{ const v=$('#setName').value.trim(); state.displayName=v; renderAccount(); persist(); };
  $('#setName').oninput=saveName;
  const lo=$('#setLogout'); if(lo)lo.onclick=async()=>{ closeDialog(); try{ await Store.signOut(); }catch(e){ alert('Logout failed: '+e.message); } };
  $('#setDone').onclick=()=>{ saveName(); closeDialog(); };
}
$('#settingsBtn').onclick=e=>{ e.stopPropagation(); openSettings(); };
$('#youCard').onclick=()=>openSettings();

$('#newThread').onclick=()=>dialog({
  title:'New thread', hint:'Name it for what goes inside — “Reading list”, “Tax 2026”, “Random”.',
  value:'', ok:'Create', run:(name)=>{
    if(!name.trim())return;
    const id=uid(),now=Date.now();
    state.threads.push({id,name:name.trim(),createdAt:now,lastActivity:now});
    state.messages[id]=[];
    openThread(id); persist();
  }
});

/* ---------- dialog ---------- */
function dialog({title,hint,value,ok,okCls,run,extraBtn,secondBtn,thirdBtn}){
  const d=$('#dialog');
  d.innerHTML=`<h3>${esc(title)}</h3><p>${esc(hint)}</p>
    ${value!==null?`<input id="dlgInput" value="${esc(value)}" placeholder="Thread name">`:''}
    ${secondBtn?`<button class="go stacked" id="dlgSecond">${esc(secondBtn.label)}</button>`:''}
    ${thirdBtn?`<button class="go stacked" id="dlgThird">${esc(thirdBtn.label)}</button>`:''}
    <div class="btns">
      ${extraBtn?`<button class="ghost" id="dlgExtra" style="margin-right:auto;color:var(--danger)">${esc(extraBtn.label)}</button>`:''}
      <button class="ghost" id="dlgCancel">Cancel</button>
      <button class="go ${okCls||''}" id="dlgOk">${esc(ok)}</button>
    </div>`;
  $('#scrim').classList.add('on');
  const inp=$('#dlgInput'); if(inp){inp.focus();inp.select();inp.onkeydown=e=>{if(e.key==='Enter')$('#dlgOk').click();};}
  $('#dlgCancel').onclick=closeDialog;
  $('#dlgOk').onclick=()=>{ run(inp?inp.value:undefined); closeDialog(); };
  if(secondBtn)$('#dlgSecond').onclick=()=>{closeDialog();secondBtn.run();};
  if(thirdBtn)$('#dlgThird').onclick=()=>{closeDialog();thirdBtn.run();};
  if(extraBtn)$('#dlgExtra').onclick=()=>{closeDialog();extraBtn.run();};
}
function closeDialog(){$('#scrim').classList.remove('on');}
$('#scrim').onclick=e=>{if(e.target===$('#scrim'))closeDialog();};

/* ---------- wire search ---------- */
$('#threadSearch').oninput=renderThreads;

/* ---------- invite a friend ---------- */
function toast(msg){
  const t=$('#toast'); if(!t)return;
  t.textContent=msg; t.classList.add('on');
  clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove('on'),2200);
}
$('#shareBtn').onclick=async()=>{
  const url=location.href.split('#')[0];
  const share={ title:'Echo', text:'Echo — private notes you send to yourself. Text, voice notes, files, synced across your devices.', url };
  try{
    if(navigator.share){ await navigator.share(share); return; }
    await navigator.clipboard.writeText(share.text+' '+url);
    toast('Invite link copied');
  }catch(e){ /* user dismissed the share sheet — no action needed */ }
};

/* ---------- go ---------- */
boot();
</script>
